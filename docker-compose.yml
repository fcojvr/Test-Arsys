version: "3.9"

services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yaml
    networks:
      - ci

  playwright:
    build:
      context: ./playwright-tests
      dockerfile: Dockerfile
    container_name: playwright
    # Kept running so Jenkins can exec into it or trigger via agent
    command: tail -f /dev/null
    volumes:
      - playwright_results:/app/playwright-report
      - playwright_results:/app/test-results
    networks:
      - ci

volumes:
  jenkins_home:
  playwright_results:

networks:
  ci:
    driver: bridge
