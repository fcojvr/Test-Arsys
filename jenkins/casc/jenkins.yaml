jenkins:
  systemMessage: "🚀 Playwright Smoke CI — configured via JCasC"
  numExecutors: 4
  mode: NORMAL
  scmCheckoutRetryCount: 2

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin"
          properties:
            - mailer:
                emailAddress: "admin@localhost"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  nodes: []

# ─── CRÍTICO: sin esto Job DSL rechaza el script al ejecutarse ───────────────
security:
  globalJobDslSecurityConfiguration:
    useScriptSecurity: false

unclassified:
  location:
    url: "http://localhost:8080/"
    adminAddress: "admin@localhost"

  timestamper:
    allPipelines: true

  ansiColorBuildWrapper:
    globalColorMapName: "xterm"

tool:
  git:
    installations:
      - name: "Default"
        home: "git"
