jenkins:
  systemMessage: "🚀 Playwright Smoke CI — configured via JCasC"
  numExecutors: 4
  mode: NORMAL
  scmCheckoutRetryCount: 2

  securityRealm:
    local:
      users:
        - id: "admin"
          password: ${ADMIN_PWD}
          properties:
            - mailer:
                emailAddress: "admin@localhost"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  nodes: []

unclassified:
  location:
    url: "http://localhost:8080/"
    adminAddress: "admin@localhost"

  timestamper:
    allPipelines: true

  ansiColorBuildWrapper:
    globalColorMapName: "xterm"

tool:
  git:
    installations:
      - name: "Default"
        home: "git"

jobs:
  - script: >
      pipelineJob('smoke-tests') {
        displayName('🔥 Playwright Smoke Tests')
        description('Job generado automáticamente vía JCasC. Ejecuta tests de Playwright desde GitHub.')
        
        logRotator {
          numToKeep(10)
        }

        definition {
          cpsScm {
            scm {
              git {
                remote { 
                  url('https://github.com/fcojvr/Test-Arsys.git') 
                }
                branch('main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }